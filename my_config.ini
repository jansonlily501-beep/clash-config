[Config]
generate_emoji=true
filter_node=
exclude_remarks=(?i)到期|重置|官网|流量|倍率

[Proxy Group]
# 1. 核心总控：顶层目录，点击此处切换大方向
- name: 🚀 全球节点切换
  type: select
  proxies:
    - 🇺🇸 美国自动
    - 🇯🇵 日本自动
    - 🇭🇰 香港自动
    - 🇹🇼 台湾自动
    - 🇸🇬 狮城自动
    - 🇰🇷 韩国自动
    - 🇬🇧 英国自动
    - 🇳🇱 荷兰自动
    - 🇨🇦 加拿大自动
    - 🇩🇪 德国自动
    - 🇫🇷 法国自动
    - 🇹🇭 泰国自动
    - 🇻🇳 越南自动
    - 🇲🇾 马来西亚自动
    - 🇮🇳 印度自动
    - 🎯 全球剩余节点

# 2. 东南亚 & 南亚 增强组
- name: 🇹🇭 泰国自动
  type: url-test
  filter: "(?i)TH|泰国|Thailand"
  url: http://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50

- name: 🇻🇳 越南自动
  type: url-test
  filter: "(?i)VN|越南|Vietnam"
  url: http://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50

- name: 🇲🇾 马来西亚自动
  type: url-test
  filter: "(?i)MY|马来西亚|Malaysia"
  url: http://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50

- name: 🇮🇳 印度自动
  type: url-test
  filter: "(?i)IN|印度|India"
  url: http://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50

# 3. 原有热门国家组
- name: 🇺🇸 美国自动
  type: url-test
  filter: "(?i)US|美国|United States"
  url: http://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50

- name: 🇯🇵 日本自动
  type: url-test
  filter: "(?i)JP|日本|Japan"
  url: http://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50

- name: 🇬🇧 英国自动
  type: url-test
  filter: "(?i)GB|UK|英国|Britain|Great Britain"
  url: http://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50

- name: 🇳🇱 荷兰自动
  type: url-test
  filter: "(?i)NL|荷兰|Netherlands"
  url: http://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50

- name: 🇨🇦 加拿大自动
  type: url-test
  filter: "(?i)CA|加拿大|Canada"
  url: http://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50

# 4. 兜底组：防止 4800 个节点里有没认出来的冷门地区
- name: 🎯 全球剩余节点
  type: select
  filter: "(?i).*"

[Rule]
# 简单粗暴的规则逻辑
- DOMAIN-SUFFIX,google.com,🚀 全球节点切换
- DOMAIN-SUFFIX,github.com,🚀 全球节点切换
- GEOIP,CN,DIRECT
- MATCH,🚀 全球节点切换
